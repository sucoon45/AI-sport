services:
  backend-api:
    build: ./backend-api
    ports:
      - "3000:3000"
    env_file: ./backend-api/.env
    depends_on:
      - ai-engine

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    env_file: ./ai-engine/.env

  admin-panel:
    build: ./admin-panel
    ports:
      - "3001:3000"
    env_file: ./admin-panel/.env.local

networks:
  default:
    name: ai-sport-network
