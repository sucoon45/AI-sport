services:
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile.prod
    env_file: ./backend-api/.env
    restart: always
    depends_on:
      - ai-engine

  ai-engine:
    build: ./ai-engine
    env_file: ./ai-engine/.env
    restart: always

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile.prod
    env_file: ./admin-panel/.env.local
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend-api
      - admin-panel

networks:
  default:
    name: ai-sport-network
